input {
  kafka {
    bootstrap_servers => "kafka-1:9092,kafka-2:9092,kafka-3:9092"
    topics => ["dlds.raw.telemetry"]
    group_id => "cg-logstash-indexer"
    auto_offset_reset => "earliest"
    codec => json
  }
}

filter {
  # Parse the incoming event timestamp (either float epoch or ISO8601) to the native @timestamp
  if [timestamp] {
    date {
      match => [ "timestamp", "UNIX", "ISO8601" ]
      target => "@timestamp"
    }
  }

  # Ensure numeric fields are typed correctly
  mutate {
    convert => {
      "bytes_sent" => "integer"
      "duration" => "float"
      "severity" => "integer"
      "ml_confidence" => "float"
      "src_port" => "integer"
      "dst_port" => "integer"
    }
  }

  if ![event_id] or [event_id] == "" {
    fingerprint {
      source => [
        "timestamp",
        "sensor",
        "src_ip",
        "src_port",
        "dst_ip",
        "dst_port",
        "protocol",
        "alert_signature",
        "bytes_sent"
      ]
      method => "SHA256"
      target => "event_id"
      concatenate_sources => true
    }
  }

  # Add optional GeoIP lookup for external IPs
  if [src_ip] and [src_ip] !~ /^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[0-1])\.)/ {
    geoip {
      source => "src_ip"
      target => "src_geoip"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "dlds-events-%{+YYYY.MM.dd}"
    document_id => "%{event_id}"
    manage_template => false
  }
  
  # For Docker debug logs
  stdout { codec => rubydebug }
}
