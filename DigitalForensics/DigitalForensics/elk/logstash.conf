input {
  # Accept JSON payloads via TCP on port 5000 from the Python Correlator
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }

  # Add geographical IP data if src_ip/dst_ip exist
  if [src_ip] {
    geoip {
      source => "src_ip"
      target => "src_geoip"
    }
  }
  if [dst_ip] {
    geoip {
      source => "dst_ip"
      target => "dst_geoip"
    }
  }

  mutate {
    convert => {
      "bytes_sent" => "integer"
      "src_port" => "integer"
      "dst_port" => "integer"
      "confidence" => "float"
      "anomaly_score" => "float"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "dlds-events-%{+YYYY.MM.dd}"
    # Optional authentication if xpack security is enabled
    # user => "elastic"
    # password => "changeme"
  }
  
  # For debugging logstash output in docker logs
  stdout { codec => rubydebug }
}
