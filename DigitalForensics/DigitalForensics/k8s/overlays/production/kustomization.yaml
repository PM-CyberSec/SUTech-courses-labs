apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
images:
  - name: ghcr.io/your-org/dlds-pipeline
    newTag: "v2.0.0"
patches:
  - target:
      kind: Deployment
      name: dlds-pipeline
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: HorizontalPodAutoscaler
      name: dlds-pipeline-hpa
    patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 20
