apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dlds-pipeline-hpa
  namespace: dlds-soc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dlds-pipeline
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
