apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: dlds-soc
  labels:
    app: logstash
spec:
  replicas: 2
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.11.1
          ports:
            - containerPort: 9600
              name: api
          env:
            - name: LS_JAVA_OPTS
              value: "-Xmx512m -Xms512m"
          volumeMounts:
            - name: logstash-config
              mountPath: /usr/share/logstash/config/logstash.yml
              subPath: logstash.yml
            - name: logstash-pipeline
              mountPath: /usr/share/logstash/pipeline/dlds-pipeline.conf
              subPath: dlds-pipeline.conf
          resources:
            requests:
              cpu: "300m"
              memory: "768Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: logstash-config
          configMap:
            name: dlds-logstash-config
        - name: logstash-pipeline
          configMap:
            name: dlds-logstash-pipeline
