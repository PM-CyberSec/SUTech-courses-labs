name: dlds_kafka

services:
  kafka-1:
    image: confluentinc/cp-kafka:7.6.1
    container_name: dlds_kafka_1
    hostname: kafka-1
    restart: unless-stopped
    ports:
      - "127.0.0.1:19092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka-1:29092,CONTROLLER://kafka-1:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka1_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - streaming

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: dlds_kafka_ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:8085:8080"
    depends_on:
      kafka-1:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: dlds-streaming
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:29092
    networks:
      - streaming

volumes:
  kafka1_data:
    name: digitalforensics_kafka1_data
    external: true

networks:
  streaming:
    name: dlds_streaming
    external: true
