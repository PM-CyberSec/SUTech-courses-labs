name: dlds-live-tcpreplay-validation

on:
  workflow_dispatch:
    inputs:
      interface:
        description: "Replay interface (example: eth0)"
        required: true
        default: "eth0"
      no_sudo:
        description: "Run tcpreplay without sudo (for privileged runners)"
        required: true
        default: "true"

jobs:
  live-attack-replay:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Runtime Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Run Live Replay Validation
        run: |
          SUDO_FLAG=""
          if [ "${{ github.event.inputs.no_sudo }}" = "true" ]; then
            SUDO_FLAG="--no-sudo"
          fi
          python scripts/live_tcpreplay_validation.py \
            --iface "${{ github.event.inputs.interface }}" \
            --scenario-file simulation/tcpreplay_scenarios.json \
            --report-file data/output/live_tcpreplay_report_ci.json \
            ${SUDO_FLAG}

      - name: Upload Replay Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dlds-live-tcpreplay-report
          path: data/output/live_tcpreplay_report_ci.json
